<script>try{var t=localStorage.getItem('explain-theme');if(t==='dark'||(!t&&matchMedia('(prefers-color-scheme:dark)').matches))document.documentElement.classList.add('dark');}catch(e){}</script>

    50:'#eef2ff',100:'#e0e7ff',200:'#c7d2fe',300:'#a5b4fc',400:'#818cf8',

<style type="text/tailwindcss">
  @layer components{
    .btn{@apply inline-flex items-center gap-1.5 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 px-3 py-1.5 text-sm font-medium text-slate-700 dark:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-700 transition cursor-pointer;}
    .section{@apply max-w-6xl mx-auto px-4 sm:px-6 py-9 scroll-mt-20 border-b border-slate-100 dark:border-slate-800;}
    .h-sec{@apply flex items-center gap-2.5 text-xl font-bold text-slate-900 dark:text-white mb-4;}
    .h-sec .idx{@apply inline-flex items-center justify-center w-7 h-7 rounded-lg bg-brand-600 text-white text-sm;}
    .lead{@apply text-[15px] leading-relaxed text-slate-600 dark:text-slate-300;}
    .metric{@apply rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 p-4;}
    .kpi-num{@apply text-2xl font-bold text-brand-600 dark:text-brand-400;}
    .kpi-label{@apply text-[13px] text-slate-500 dark:text-slate-400 mt-1;}
    .card{@apply rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 p-4;}
    .card-t{@apply font-semibold text-slate-900 dark:text-white mb-1.5;}
    .diagram{@apply relative rounded-xl border border-slate-200 dark:border-slate-700 bg-white p-3 my-3;}
    .diagram-canvas{@apply overflow-hidden cursor-grab flex justify-center;}
    .diagram-tools{@apply absolute top-2 right-2 flex gap-1 z-10;}
    .diagram-tools button{@apply w-8 h-8 rounded-md border border-slate-300 bg-white/95 text-slate-600 hover:bg-slate-100 text-lg leading-none flex items-center justify-center cursor-pointer;}
    .cap{@apply text-[13px] text-slate-500 dark:text-slate-400 mt-2 text-center;}
    .badge{@apply inline-block rounded px-2 py-0.5 text-xs font-semibold align-middle;}
    .badge-high{@apply bg-red-100 text-red-700 dark:bg-red-900/40 dark:text-red-300;}
    .badge-med{@apply bg-amber-100 text-amber-700 dark:bg-amber-900/40 dark:text-amber-300;}
    .badge-low{@apply bg-emerald-100 text-emerald-700 dark:bg-emerald-900/40 dark:text-emerald-300;}
    .badge-info{@apply bg-brand-100 text-brand-700 dark:bg-brand-900/40 dark:text-brand-300;}
    .acc{@apply rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 mb-2.5 overflow-hidden;}
    .acc>summary{@apply cursor-pointer select-none px-4 py-3 font-semibold text-slate-800 dark:text-slate-100 flex items-center gap-2 hover:bg-slate-50 dark:hover:bg-slate-700/40 marker:content-[''];}
    .acc>summary::after{@apply ml-auto text-slate-400 transition-transform content-['▸'];}
    .acc[open]>summary::after{@apply rotate-90;}
    .acc-body{@apply px-4 pb-4 pt-1 text-[14px] text-slate-600 dark:text-slate-300;}
    .riskcard{@apply rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 p-4 border-l-4;}
    .riskcard-high{@apply border-l-red-500;} .riskcard-med{@apply border-l-amber-500;} .riskcard-low{@apply border-l-emerald-500;}
    .callout{@apply rounded-lg border p-3 my-3 text-[14px];}
    .callout-note{@apply border-brand-200 bg-brand-50 text-slate-700 dark:bg-brand-900/20 dark:border-brand-800 dark:text-slate-200;}
    .callout-warn{@apply border-amber-200 bg-amber-50 text-slate-700 dark:bg-amber-900/20 dark:border-amber-800 dark:text-slate-200;}
    .callout-ok{@apply border-emerald-200 bg-emerald-50 text-slate-700 dark:bg-emerald-900/20 dark:border-emerald-800 dark:text-slate-200;}
    .ctag{@apply font-semibold block mb-1;}
    .tbl{@apply w-full text-[13.5px] border-collapse;}
    .tbl th{@apply text-left font-semibold bg-slate-100 dark:bg-slate-700/60 px-3 py-2 border-b border-slate-200 dark:border-slate-600;}
    .tbl td{@apply px-3 py-2 border-b border-slate-100 dark:border-slate-700/70 align-top;}
    .tbl tbody tr:hover{@apply bg-slate-50 dark:bg-slate-700/30;}
    .chip{@apply inline-flex items-center gap-1.5 rounded-full border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 px-3 py-1 text-[13px];}
    .chip b{@apply text-brand-600 dark:text-brand-400 font-bold;}
    .steps{@apply list-none p-0 m-0;}
    .steps>li{@apply relative pl-8 pb-3 ml-3 border-l-2 border-slate-200 dark:border-slate-700 last:border-l-transparent;}
    .val{@apply font-mono bg-slate-100 dark:bg-slate-700 rounded px-1.5 py-0.5 text-[13px];}
  }
</style>
<style>
  html{scroll-behavior:smooth}
  body code{background:rgba(99,102,241,.1);padding:.1em .35em;border-radius:4px}
  .diagram-canvas{max-height:72vh}
  .diagram-canvas svg{transform-origin:0 0}
  .diagram .mermaid{margin:0;background:transparent;border:0;text-align:center}
  /* Keep node labels on a single line per <br/> segment so Mermaid measures full text width and never clips it */
  .diagram .mermaid .nodeLabel,.diagram .mermaid span.nodeLabel,.diagram .mermaid .edgeLabel{white-space:nowrap}
  .diagram .mermaid foreignObject{overflow:visible}
  /* Fullscreen-style overlay: shows one diagram at ~80% of the viewport with its own zoom/pan */
  .diagram-modal{position:fixed;inset:0;z-index:50;display:none;align-items:center;justify-content:center;background:rgba(15,23,42,.55);backdrop-filter:blur(2px)}
  .diagram-modal.open{display:flex}
  .diagram-modal-panel{position:relative;width:80vw;height:80vh;background:#fff;border-radius:14px;box-shadow:0 24px 60px -12px rgba(0,0,0,.45)}
  .dark .diagram-modal-panel{background:#0f172a;border:1px solid rgb(51 65 85)}
  .diagram-modal-canvas{width:100%;height:100%;overflow:hidden;cursor:grab;display:flex;align-items:center;justify-content:center}
  .diagram-modal-canvas svg{transform-origin:center center}
  .diagram-modal-tools{position:absolute;top:.6rem;right:.6rem;display:flex;gap:.375rem;z-index:10}
  .diagram-modal-tools button{width:34px;height:34px;border-radius:8px;border:1px solid rgb(203 213 225);background:rgba(255,255,255,.95);color:rgb(71 85 105);font-size:18px;line-height:1;display:flex;align-items:center;justify-content:center;cursor:pointer}
  .diagram-modal-tools button:hover{background:rgb(241 245 249)}
  .dark .diagram-modal-tools button{border-color:rgb(71 85 105);background:rgba(30,41,59,.95);color:rgb(203 213 225)}
  .steps>li::before{counter-increment:st;content:counter(st);position:absolute;left:-13px;top:0;width:24px;height:24px;border-radius:9999px;background:#e0e7ff;color:#4338ca;font-weight:700;font-size:12px;display:flex;align-items:center;justify-content:center;border:2px solid #fff}
  .dark .steps>li::before{background:#3730a3;color:#c7d2fe;border-color:#0f172a}
  .steps{counter-reset:st}
  /* Fixed right-hand TOC: shown only on wide enough screens to avoid overlapping the centered body */
  #section-toc{position:fixed;top:50%;right:.75rem;transform:translateY(-50%);z-index:20;display:none;flex-direction:column;width:10rem;max-height:78vh;overflow:auto;padding:.75rem;border-radius:.85rem;border:1px solid rgb(226 232 240);background:rgba(255,255,255,.92);backdrop-filter:blur(8px);box-shadow:0 8px 24px -8px rgba(0,0,0,.15)}
  .dark #section-toc{border-color:rgb(51 65 85);background:rgba(30,41,59,.92)}
  .toc-title{font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:rgb(148 163 184);margin:0 .25rem .5rem}
  .toc-list{display:flex;flex-direction:column;gap:.125rem}
  .toc-list a{display:block;padding:.3rem .5rem;border-radius:.5rem;font-size:13px;line-height:1.3;color:rgb(100 116 139);border-left:2px solid transparent;text-decoration:none;transition:background .15s,color .15s}
  .dark .toc-list a{color:rgb(148 163 184)}
  .toc-list a:hover{background:rgb(241 245 249);color:rgb(79 70 229)}
  .dark .toc-list a:hover{background:rgb(51 65 85);color:rgb(165 180 252)}
  .toc-list a.active{background:rgb(238 242 255);color:rgb(79 70 229);font-weight:600;border-left-color:rgb(79 70 229)}
  .dark .toc-list a.active{background:rgba(67,56,202,.28);color:rgb(165 180 252);border-left-color:rgb(129 140 248)}
  @media (min-width:1440px){#section-toc{display:flex}}
  @media print{
    #section-toc{display:none !important}
    .no-print{display:none !important}
    .acc-body{display:block !important}
    .section{break-inside:avoid;border:0}
    .diagram-canvas{max-height:none}
    .tbl th{position:static}
    body{background:#fff !important}
  }
</style>
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-slate-900 dark:text-slate-200 antialiased">

<!-- 1. Top nav bar -->
<header class="no-print sticky top-0 z-30 backdrop-blur bg-white/80 dark:bg-slate-900/80 border-b border-slate-200 dark:border-slate-700">
  <div class="max-w-6xl mx-auto px-4 sm:px-6 h-14 flex items-center gap-3">
    <span class="shrink-0 inline-flex items-center justify-center w-7 h-7 rounded-lg bg-brand-600 text-white text-xs font-bold">EX</span>
    <div class="min-w-0">
      <div class="font-bold text-slate-900 dark:text-white text-sm leading-tight truncate">__TITLE__</div>
      <code class="block text-[11px] text-slate-400 truncate">__PATH__</code>
    </div>
    <div class="ml-auto flex items-center gap-2">
      <button id="theme-toggle" class="btn shrink-0" title="Dark / Light">🌓</button>
      <button id="export-pdf" class="btn shrink-0" title="Export PDF (print)">⬇ PDF</button>
    </div>
  </div>
</header>

<main>
__CONTENT__
</main>

<!-- Right-hand TOC (fixed on wide screens, with scroll-spy anchor highlighting) -->
<aside id="section-toc" class="no-print" aria-label="Contents">
  <div class="toc-title">Contents</div>
  <nav id="section-toc-list" class="toc-list"></nav>
</aside>

<footer class="no-print max-w-6xl mx-auto px-4 sm:px-6 py-8 text-[13px] text-slate-400">
  Generated by the <code>explain-code</code> skill · offline self-contained single file · the explanation is based on real code; any assumed example values are flagged inline.
</footer>

<!--__MERMAID_LIB__-->
<script>
(function(){
  var root=document.documentElement, KEY='explain-theme';
  function ready(fn){ if(document.readyState!=='loading')fn(); else document.addEventListener('DOMContentLoaded',fn); }
  ready(function(){
    var tg=document.getElementById('theme-toggle');
    tg&&tg.addEventListener('click',function(){ var d=root.classList.toggle('dark'); try{localStorage.setItem(KEY,d?'dark':'light');}catch(e){} });
    var ep=document.getElementById('export-pdf');
    ep&&ep.addEventListener('click',function(){ document.querySelectorAll('details').forEach(function(d){d.open=true;}); window.print(); });

    var toc=document.getElementById('section-toc-list');
    if(toc){
      var links={}, secs=[].slice.call(document.querySelectorAll('main section[id]'));
      secs.forEach(function(s){
        var h=s.querySelector('h2'); if(!h)return;
        var a=document.createElement('a'); a.href='#'+s.id;
        a.textContent=h.textContent.replace(/^\s*[0-9]+[.、]?\s*/,'');
        toc.appendChild(a); links[s.id]=a;
      });
      // Scroll-spy: highlight the TOC entry for whichever section enters the top of the viewport
      if('IntersectionObserver' in window){
        var spy=new IntersectionObserver(function(entries){
          entries.forEach(function(en){
            if(!en.isIntersecting)return;
            var cur=links[en.target.id]; if(!cur)return;
            Object.keys(links).forEach(function(k){links[k].classList.remove('active');});
            cur.classList.add('active');
          });
        },{rootMargin:'-15% 0px -75% 0px',threshold:0});
        secs.forEach(function(s){ if(links[s.id]) spy.observe(s); });
      }
      // Smooth scroll on click (html has scroll-behavior:smooth; sections have a scroll-mt offset)
      toc.addEventListener('click',function(e){ var a=e.target.closest('a'); if(a)a.blur(); });
    }

    document.querySelectorAll('[data-rules]').forEach(function(box){
      var s=box.querySelector('[data-rules-search]'), f=box.querySelector('[data-rules-filter]'),
          rows=[].slice.call(box.querySelectorAll('tbody tr'));
      function run(){ var q=((s&&s.value)||'').trim().toLowerCase(), fv=f?f.value:'all';
        rows.forEach(function(r){ var t=r.textContent.toLowerCase(), rk=r.getAttribute('data-risk')||'';
          r.style.display=((!q||t.indexOf(q)>=0)&&(fv==='all'||rk===fv))?'':'none'; }); }
      s&&s.addEventListener('input',run); f&&f.addEventListener('change',run);
    });

    if(window.mermaid){
      try{
        var FONTS="ui-sans-serif,system-ui,-apple-system,'Segoe UI','Microsoft YaHei','PingFang SC','Hiragino Sans GB',sans-serif";
        mermaid.initialize({startOnLoad:false,theme:'default',securityLevel:'loose',flowchart:{useMaxWidth:true,htmlLabels:true,padding:12,nodeSpacing:55,rankSpacing:55},themeVariables:{fontFamily:FONTS}});
        // Wait for fonts so Mermaid measures label width with the final metrics (otherwise node boxes are sized too small and clip CJK/mixed text).
        var fontsReady=(document.fonts&&document.fonts.ready)?document.fonts.ready:Promise.resolve();
        fontsReady.then(function(){ var p=mermaid.run({querySelector:'.mermaid'}); return (p&&p.then)?p:Promise.resolve(); })
          .then(function(){ document.querySelectorAll('.diagram').forEach(enableZoom); })
          .catch(function(){ fallbackAll(); });
      }catch(e){ fallbackAll(); }
    } else { fallbackAll(); }
  });
  function fallbackAll(){ document.querySelectorAll('.mermaid').forEach(function(el){ if(el.dataset.fb)return; el.dataset.fb='1';
    var n=document.createElement('div'); n.className='callout callout-warn'; n.innerHTML='<span class="ctag">Diagram not rendered</span>Mermaid did not load; the diagram source is shown below.'; el.parentNode.insertBefore(n,el); }); }
  var _modal=null;
  function buildModal(){
    var m=document.createElement('div'); m.className='diagram-modal no-print';
    m.innerHTML='<div class="diagram-modal-panel"><div class="diagram-modal-tools"><button type="button" data-m="in" title="Zoom in">+</button><button type="button" data-m="out" title="Zoom out">−</button><button type="button" data-m="reset" title="Reset / fit">↻</button><button type="button" data-m="close" title="Close (Esc)">✕</button></div><div class="diagram-modal-canvas"></div></div>';
    document.body.appendChild(m);
    var canvas=m.querySelector('.diagram-modal-canvas'), tools=m.querySelector('.diagram-modal-tools');
    var scale=1,tx=0,ty=0,drag=false,ox=0,oy=0,svg=null;
    function apply(){ if(svg) svg.style.transform='translate('+tx+'px,'+ty+'px) scale('+scale+')'; }
    function zoom(f){ scale=Math.min(8,Math.max(0.15,scale*f)); apply(); }
    function fit(){ if(!svg)return; try{ var cb=canvas.getBoundingClientRect(), vb=svg.viewBox&&svg.viewBox.baseVal,
        w=(vb&&vb.width)?vb.width:svg.getBoundingClientRect().width, h=(vb&&vb.height)?vb.height:svg.getBoundingClientRect().height;
        if(w&&h){ scale=Math.min(cb.width/w,cb.height/h)*0.96; tx=0;ty=0; apply(); } }catch(e){} }
    function onKey(e){ if(e.key==='Escape')close(); }
    function close(){ m.classList.remove('open'); canvas.innerHTML=''; svg=null; document.removeEventListener('keydown',onKey); }
    tools.addEventListener('click',function(e){ var z=e.target.getAttribute('data-m'); if(!z)return; if(z==='in')zoom(1.25); else if(z==='out')zoom(0.8); else if(z==='reset')fit(); else close(); });
    m.addEventListener('pointerdown',function(e){ if(e.target===m)close(); });
    canvas.addEventListener('wheel',function(e){ e.preventDefault(); zoom(e.deltaY<0?1.1:0.9); },{passive:false});
    canvas.addEventListener('pointerdown',function(e){ drag=true; ox=e.clientX-tx; oy=e.clientY-ty; canvas.style.cursor='grabbing'; try{canvas.setPointerCapture(e.pointerId);}catch(_){} });
    canvas.addEventListener('pointermove',function(e){ if(!drag)return; tx=e.clientX-ox; ty=e.clientY-oy; apply(); });
    canvas.addEventListener('pointerup',function(){ drag=false; canvas.style.cursor='grab'; });
    canvas.addEventListener('pointerleave',function(){ drag=false; canvas.style.cursor='grab'; });
    _modal={ open:function(src){ if(!src)return; var c=src.cloneNode(true); c.style.transform=''; c.style.maxWidth='none'; c.removeAttribute('width'); c.removeAttribute('height');
        var vb=src.viewBox&&src.viewBox.baseVal; if(vb&&vb.width){ c.style.width=vb.width+'px'; c.style.height=vb.height+'px'; }
        canvas.innerHTML=''; canvas.appendChild(c); svg=c; scale=1;tx=0;ty=0; m.classList.add('open'); document.addEventListener('keydown',onKey); requestAnimationFrame(fit); } };
  }
  function openModal(src){ if(!src)return; if(!_modal)buildModal(); _modal.open(src); }
  function enableZoom(d){
    var svg=d.querySelector('svg'); if(!svg||d.dataset.zoom)return; d.dataset.zoom='1';
    var scale=1,tx=0,ty=0,drag=false,ox=0,oy=0;
    var canvas=document.createElement('div'); canvas.className='diagram-canvas';
    svg.parentNode.insertBefore(canvas,svg); canvas.appendChild(svg);
    function apply(){ svg.style.transform='translate('+tx+'px,'+ty+'px) scale('+scale+')'; }
    function zoom(f){ scale=Math.min(6,Math.max(0.3,scale*f)); apply(); }
    var bar=document.createElement('div'); bar.className='diagram-tools no-print';
    bar.innerHTML='<button type="button" data-z="in" title="Zoom in">+</button><button type="button" data-z="out" title="Zoom out">−</button><button type="button" data-z="reset" title="Reset">↻</button><button type="button" data-z="full" title="Fullscreen">⛶</button>';
    d.appendChild(bar);
    bar.addEventListener('click',function(e){ var z=e.target.getAttribute('data-z'); if(!z)return; if(z==='in')zoom(1.25); else if(z==='out')zoom(0.8); else if(z==='full')openModal(svg); else {scale=1;tx=0;ty=0;apply();} });
    canvas.addEventListener('wheel',function(e){ e.preventDefault(); zoom(e.deltaY<0?1.1:0.9); },{passive:false});
    canvas.addEventListener('pointerdown',function(e){ drag=true; ox=e.clientX-tx; oy=e.clientY-ty; canvas.style.cursor='grabbing'; try{canvas.setPointerCapture(e.pointerId);}catch(_){} });
    canvas.addEventListener('pointermove',function(e){ if(!drag)return; tx=e.clientX-ox; ty=e.clientY-oy; apply(); });
    canvas.addEventListener('pointerup',function(){ drag=false; canvas.style.cursor='grab'; });
    canvas.addEventListener('pointerleave',function(){ drag=false; canvas.style.cursor='grab'; });
    apply();
  }
})();
</script>
